name: Docker CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Build Backend
      working-directory: backend/taskmanagerbackend/taskmanagerbackend
      run: mvn clean package -DskipTests   # ✅ FIXED

    - name: Build Backend Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-backend ./backend/taskmanagerbackend/taskmanagerbackend

    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-backend

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      working-directory: frontend/vite-project
      run: |
        npm install
        npm run build

    - name: Build Frontend Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-frontend ./frontend/vite-project

    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager-frontend